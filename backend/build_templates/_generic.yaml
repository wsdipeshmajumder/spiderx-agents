# _generic — the fallback root template.
#
# Used when triage matches an industry we don't have a specific template
# for. Even so, the operator still gets a FULL interview that covers
# every standard dashboard field — services, offers, staff highlights,
# hours, location, contact details. The agent produced from this
# template arrives at the dashboard ~90% prefilled regardless of which
# obscure industry the operator runs.
#
# Other templates also `inherits: _generic` to pick up the shared
# question shapes (hours, services, escalation_phone, agent_name)
# without repeating themselves — they extend with industry-specific
# questions via `questions_append:` and override answer copy via
# `agent_profile_overrides:`.
id: _generic
schema_version: 1

facets:
  industry: "*"          # wildcard — matches anything if nothing else does
  sub_industry: "*"
  locale: "*"

# No triage keywords — _generic only matches by being the LAST resort.
matches: {}

intro: |
  Got it. Quick interview and she's ready.

questions:
  - id: business_name
    prompt: "What's the name of your business?"
    slot: variables.business_name
    type: text
    required: true
    hint: "Exactly as you'd want callers to hear it."

  - id: city
    prompt: "Which city are you in?"
    slot: variables.city
    type: text
    required: true
    hint: "Just the city is fine."

  - id: services
    prompt: "What services do you offer?"
    slot: variables.services
    type: text_list
    required: true
    hint: "Comma-separated — your main 3-5 services callers ask about."

  - id: primary_job
    prompt: "What do callers usually need from you?"
    slot: primary_job
    type: text
    required: true
    hint: "One short phrase — e.g. 'book appointments' or 'get pricing'."

  - id: staff_highlights
    prompt: "Any key people callers ask for by name?"
    slot: variables.staff_highlights
    type: text
    required: false
    hint: "e.g. 'Dr. Rao' or 'lead stylist Anita'. Skip if not relevant."

  - id: hours
    prompt: "What are your working hours?"
    slot: variables.hours
    type: text
    required: true
    default: "Mon–Sat 9 AM – 6 PM, closed Sun"

  - id: offers
    prompt: "Any current offers or discounts I should mention?"
    slot: variables.offers
    type: text
    required: false
    hint: "e.g. '10% off first visit' or 'free consultation in May'. Skip if none."

  - id: address
    prompt: "What's the address callers ask for?"
    slot: variables.address
    type: text
    required: false
    hint: "Street + area is fine — she'll read it back on calls."

  - id: website
    prompt: "Do you have a website?"
    slot: variables.website
    type: url
    required: false
    hint: "Skip if you don't have one yet."

  - id: languages
    prompt: "What language(s) should the agent speak?"
    slot: variables.languages
    type: text
    required: true
    hint: "Comma-separated if multiple."

  - id: escalation_phone
    prompt: "If a caller needs a human, what number should the agent forward to?"
    slot: variables.phone
    type: phone
    required: false

  - id: agent_name
    prompt: "What should we call her?"
    slot: agent_name
    type: text
    required: true
    # 1-2 syllable female names spanning IN + US/UK feel — used as
    # fallback when no industry/locale template matched. Server
    # shuffles per build_sid.
    suggestions: [Aria, Iris, Nia, Ruby, Tara, Ava, Mira]

agent_profile:
  sector: generic
  voice: Aoede
  persona: "Warm, efficient receptionist."
  greeting: "Hello, this is {{agent_name}} from {{business_name}} — how can I help?"
  system_prompt: |
    You are {{agent_name}}, the receptionist for {{business_name}}{{#if city}} in {{city}}{{/if}}.

    Most callers want to {{primary_job}}.

    SERVICES
    {{services}}

    {{#if staff_highlights}}KEY PEOPLE
    {{staff_highlights}}{{/if}}

    HOURS
    {{hours}}

    {{#if offers}}CURRENT OFFERS
    {{offers}}{{/if}}

    {{#if address}}ADDRESS
    {{address}}{{/if}}

    LANGUAGES
    Speak in {{languages}} by default; mirror the caller's language on switch.

    HOW TO HELP
    - Service questions → use the SERVICES list above; if a service isn't listed,
      take their request and offer a callback.
    - Booking / appointment → confirm the date + service, capture name + phone,
      offer to put them through if they want a same-day slot.
    - Hours / location → read directly from above.
    - Pricing → never quote a firm price for services not on a fixed menu; offer
      a callback or in-person visit.
    {{#if offers}}- If a caller asks about deals → mention the current offer above.{{/if}}

    TONE
    - Be warm, acknowledge before acting, confirm critical details.
    - Close with 'anything else I can help with?'.
    - If a caller asks something you can't answer, say 'let me put you through to
      one of the team' rather than guessing.
  connectors: [calendar_check, calendar_book, knowledge_base_search]
  outcomes: [booked, info_only, callback_requested, voicemail, escalated]
  policy:
    dos: {confirm_booking: true, sms_recap: true, language_match: true, name_caller: true}
    donts: {no_price_promise: true, no_phone_payment: true}
  small_talk:
    - "Hope your day's going well."
    - "Thanks for calling."
    - "How can I help?"
